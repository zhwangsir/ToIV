name: toiv

services:
  api:
    build:
      context: ../apps/api
    environment:
      TOIV_COMFY_WORKERS: "http://192.168.71.100:8000,http://192.168.71.100:8002,http://192.168.71.100:8003,http://192.168.71.100:8004"
      TOIV_DATABASE_URL: "sqlite:////data/toiv.db"
      TOIV_JWT_SECRET: "${TOIV_JWT_SECRET:?set TOIV_JWT_SECRET in deploy/.env}"
      TOIV_ADMIN_EMAIL: "${TOIV_ADMIN_EMAIL:-admin}"
      TOIV_ADMIN_PASSWORD: "${TOIV_ADMIN_PASSWORD:-admin123}"
      TOIV_CORS_ORIGINS: "${TOIV_CORS_ORIGINS:-*}"
    volumes:
      - toiv-data:/data
    ports:
      - "8090:8080"
    restart: unless-stopped

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-}"
    ports:
      - "3100:3100"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  toiv-data:
