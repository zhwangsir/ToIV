name: toiv

services:
  api:
    build:
      context: ../apps/api
    environment:
      # 4卡 PRO6000(8000/8002/8003/8004)+ PC01 5090(Tailscale 8188);可在 deploy/.env 覆盖
      TOIV_COMFY_WORKERS: "${TOIV_COMFY_WORKERS:-http://192.168.71.100:8000,http://192.168.71.100:8002,http://192.168.71.100:8003,http://192.168.71.100:8004,http://100.82.102.43:8188}"
      TOIV_DATABASE_URL: "sqlite:////data/toiv.db"
      # AI 智能体大脑:Pro6000 机(.100)LM Studio @ :1234,模型 qwen/qwen3.6-35b-a3b
      TOIV_LLM_BASE_URL: "${TOIV_LLM_BASE_URL:-http://192.168.71.100:1234/v1}"
      TOIV_LLM_MODEL: "${TOIV_LLM_MODEL:-qwen/qwen3.6-35b-a3b}"
      TOIV_EMBED_MODEL: "${TOIV_EMBED_MODEL:-text-embedding-nomic-embed-text-v1.5}"
      TOIV_JWT_SECRET: "${TOIV_JWT_SECRET:?set TOIV_JWT_SECRET in deploy/.env}"
      TOIV_ADMIN_EMAIL: "${TOIV_ADMIN_EMAIL:-admin}"
      TOIV_ADMIN_PASSWORD: "${TOIV_ADMIN_PASSWORD:-admin123}"
      TOIV_CORS_ORIGINS: "${TOIV_CORS_ORIGINS:-*}"
    volumes:
      - toiv-data:/data
    ports:
      - "8090:8080"
    restart: unless-stopped

  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_BASE: "${NEXT_PUBLIC_API_BASE:-}"
    ports:
      - "3100:3100"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  toiv-data:
