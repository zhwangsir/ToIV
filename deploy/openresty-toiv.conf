# toiv.dgmt.top —— HTTP 80:ACME 续期挑战 + 强制跳转 HTTPS
server {
    listen 80;
    server_name toiv.dgmt.top;

    location /.well-known/acme-challenge/ {
        root /www/sites/dgmt.top;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# IP 直连兜底(HTTP)
server {
    listen 80;
    server_name 43.119.32.180;
    client_max_body_size 30m;

    location /api/ {
        proxy_pass http://100.86.42.89:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
    location / {
        proxy_pass http://100.86.42.89:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# toiv.dgmt.top —— HTTPS 443 主站
server {
    listen 443 ssl;
    http2 on;
    server_name toiv.dgmt.top;

    ssl_certificate     /usr/local/openresty/nginx/conf/ssl/toiv.dgmt.top/fullchain.pem;
    ssl_certificate_key /usr/local/openresty/nginx/conf/ssl/toiv.dgmt.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 30m;

    # 后端 API + SSE
    location /api/ {
        proxy_pass http://100.86.42.89:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # 前端
    location / {
        proxy_pass http://100.86.42.89:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
